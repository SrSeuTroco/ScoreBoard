<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Debug Lelong</title>
    <style>
        body { background: #222; color: #0f0; font-family: monospace; padding: 20px; font-size: 1.5rem; }
        #log { color: #fff; font-size: 2rem; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    1. Toque em qualquer lugar desta tela primeiro para focar.<br><br>
    2. Aperte os botões do controle Lelong.<br>
    <span id="log">Aguardando...</span>

    <script>
        // Confirma que a janela pegou o foco
        window.addEventListener('click', () => {
            document.getElementById('log').innerText = "Tela focada! Pode testar os botões.";
        });

        // Captura tudo o que o controle mandar
        window.addEventListener('keydown', (e) => {
            e.preventDefault(); // Tenta bloquear o comportamento padrão do SO
            document.getElementById('log').innerHTML = `
                e.key: <strong style="color:yellow">${e.key}</strong><br>
                e.code: <strong style="color:cyan">${e.code}</strong><br>
                e.keyCode: <strong style="color:magenta">${e.keyCode}</strong>
            `;
        });
    </script>
</body>
</html>
